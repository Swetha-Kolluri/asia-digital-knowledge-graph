<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPI Weekly Scan Asia Pacific</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8c96a;
  --bg: #0a0a0a;
  --card: #0e0e0e;
  --border: #1c1c1c;
  --border-light: #2a2a2a;
  --text: #e8e8e8;
  --text-dim: #888;
  --text-muted: #555;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'Inter', system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:15px; line-height:1.6; min-height:100vh; }

/* ── MASTHEAD ── */
.masthead { background:#000; border-bottom:1px solid var(--border); padding:26px 24px 18px; text-align:center; }
.masthead-eyebrow { font-size:10px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:10px; }
.masthead-title { font-family:var(--serif); font-size:clamp(1.8rem,5vw,3.2rem); font-weight:700; color:#fff; line-height:1.1; letter-spacing:-0.5px; }
.masthead-title .accent { color:var(--gold); }
.masthead-meta { margin-top:10px; display:flex; justify-content:center; align-items:center; gap:18px; flex-wrap:wrap; }
.masthead-meta span { font-size:11px; color:var(--text-muted); letter-spacing:.5px; }
.masthead-meta .pipe { color:var(--border-light); }
.live-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:#4caf50; margin-right:5px; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── STICKY NAV (theme pills + tabs) ── */
.sticky-nav { position:sticky; top:0; z-index:100; background:rgba(10,10,10,.97); backdrop-filter:blur(14px); }

/* theme pill bar */
.theme-bar { display:flex; align-items:center; justify-content:center; gap:8px; padding:10px 20px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
.theme-pill { padding:5px 14px; border-radius:20px; border:1px solid var(--border-light); background:transparent; color:var(--text-muted); font-size:11px; font-weight:600; letter-spacing:.6px; cursor:pointer; transition:all .18s; font-family:var(--sans); white-space:nowrap; }
.theme-pill:hover { border-color:var(--gold); color:var(--text); }
.theme-pill.active { background:var(--gold); border-color:var(--gold); color:#000; }

/* tab row */
.tabs-wrap { overflow-x:auto; scrollbar-width:none; border-bottom:1px solid var(--border); }
.tabs-wrap::-webkit-scrollbar { display:none; }
.tabs { display:flex; align-items:center; padding:0 16px; gap:2px; min-width:max-content; }
.tab { padding:12px 16px; font-size:12px; font-weight:500; color:var(--text-muted); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; transition:all .2s; white-space:nowrap; font-family:var(--sans); letter-spacing:.2px; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--gold); border-bottom-color:var(--gold); }
.tab-divider { width:1px; height:20px; background:var(--border); margin:0 6px; align-self:center; flex-shrink:0; }
.tab-mdb { color:#60a5fa !important; }
.tab-mdb.active { color:#000 !important; background:linear-gradient(90deg,#1d4ed8,#2563eb); border-bottom-color:#60a5fa; }

/* ── MAIN ── */
.main { max-width:1280px; margin:0 auto; padding:32px 20px 60px; }

/* ── SECTION DIVIDER ── */
.section-divider { display:flex; align-items:center; gap:16px; margin:48px 0 28px; }
.section-divider:first-child { margin-top:0; }
.section-divider h2 { font-family:var(--serif); font-size:1.4rem; font-weight:600; color:#fff; white-space:nowrap; }
.section-divider .flag { font-size:1.3rem; }
.section-divider .line { flex:1; height:1px; background:linear-gradient(to right,var(--border-light),transparent); }
.section-divider.mdb-divider h2 { color:#60a5fa; }

/* ── GRID ── */
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
@media(max-width:1024px) { .grid { grid-template-columns:repeat(2,1fr); } }
@media(max-width:600px)  { .grid { grid-template-columns:1fr; } }

/* ── CARD ── */
.card { background:var(--card); border:1px solid var(--border); border-radius:8px; overflow:hidden; display:flex; flex-direction:column; transition:border-color .2s,transform .2s; cursor:pointer; }
.card:hover { border-color:var(--border-light); transform:translateY(-2px); }
.card.featured { grid-column:span 2; flex-direction:row; }
@media(max-width:600px) { .card.featured { grid-column:span 1; flex-direction:column; } }

/* thumbnail */
.thumb { position:relative; overflow:hidden; flex-shrink:0; }
.card:not(.featured) .thumb { height:160px; }
.card.featured .thumb { width:260px; min-height:220px; }
@media(max-width:1024px) { .card.featured .thumb { width:200px; } }
@media(max-width:600px)  { .card.featured .thumb { width:100%; height:180px; } }
.thumb-bg { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:2.8rem; position:relative; }
.thumb-bg::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(0,0,0,.3),rgba(0,0,0,.6)); }
.thumb-flag { position:absolute; bottom:8px; right:10px; font-size:1.05rem; z-index:1; filter:drop-shadow(0 1px 3px rgba(0,0,0,.8)); }
.thumb-badge { position:absolute; bottom:8px; right:10px; z-index:1; font-size:9px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; background:rgba(0,0,0,.75); color:#60a5fa; border:1px solid #2563eb; border-radius:3px; padding:2px 6px; }

/* card body */
.card-body { padding:18px 20px 20px; display:flex; flex-direction:column; gap:10px; flex:1; }
.card-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.badge { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:3px 8px; border-radius:3px; border:1px solid currentColor; }
.card-org { font-size:11px; color:var(--text-muted); font-weight:500; }
.card-date { font-size:11px; color:var(--text-muted); margin-left:auto; }
.card-headline { font-family:var(--serif); font-size:1.05rem; font-weight:600; color:#fff; line-height:1.4; }
.card.featured .card-headline { font-size:1.2rem; }
.card-summary { font-size:13px; color:var(--text-dim); line-height:1.65; flex:1; }
.card-source { font-size:11px; color:var(--text-muted); }
.card-link { display:inline-flex; align-items:center; gap:5px; color:var(--gold); font-size:12px; font-weight:600; text-decoration:none; transition:color .2s; margin-top:4px; }
.card-link:hover { color:var(--gold-light); }
.card-link svg { width:12px; height:12px; }

/* ── MDB intro box ── */
.mdb-intro { border:1px solid #1d4ed8; border-radius:8px; padding:18px 22px; background:#0a1628; margin-bottom:28px; }
.mdb-intro h3 { font-family:var(--serif); font-size:1.05rem; color:#60a5fa; margin-bottom:6px; }
.mdb-intro p { font-size:12px; color:var(--text-dim); line-height:1.6; }

/* ── SOURCES FOOTER ── */
.sources-section { border-top:1px solid var(--border); margin-top:64px; padding-top:40px; padding-bottom:40px; }
.sources-section h3 { font-family:var(--serif); font-size:1.1rem; font-weight:600; color:var(--gold); margin-bottom:20px; text-align:center; }
.sources-grid { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:960px; margin:0 auto; }
.source-tag { font-size:11px; color:var(--text-muted); border:1px solid var(--border); border-radius:4px; padding:5px 12px; transition:border-color .2s,color .2s; }
.source-tag:hover { border-color:var(--gold); color:var(--gold); }
.source-tag.mdb { border-color:#1d4ed8; color:#60a5fa; }
.footer-copy { text-align:center; margin-top:28px; font-size:11px; color:var(--text-muted); }

/* ── EMPTY STATE ── */
.empty { text-align:center; padding:60px 20px; color:var(--text-muted); }
.empty h3 { font-family:var(--serif); font-size:1.3rem; margin-bottom:8px; color:var(--text-dim); }

/* ── THEME COLOURS ── */
.theme-digital-id    { color:#a78bfa; border-color:#a78bfa; }
.theme-dpi           { color:#60a5fa; border-color:#60a5fa; }
.theme-ai            { color:#34d399; border-color:#34d399; }
.theme-data-exchange { color:#fbbf24; border-color:#fbbf24; }
.theme-political     { color:#f87171; border-color:#f87171; }
.theme-digital-leaders { color:#c084fc; border-color:#c084fc; }
.theme-digital       { color:#38bdf8; border-color:#38bdf8; }
</style>
</head>

// ── SOURCES ───────────────────────────────────────────────────────────────────
const SOURCES = {
  country: ["Reuters","Associated Press (AP)","BBC","Jakarta Post","Kompas","Bisnis Indonesia",
    "The Daily Star (BD)","Nation Thailand","Kathmandu Post","Rising Nepal Daily","The PNG Sun",
    "GovInsider Asia","Biometric Update","Tech Policy Press","Chatham House","UNESCAP","UIDAI",
    "MeitY","Reserve Bank of India","Bank Indonesia","PSA Philippines","DICT Philippines",
    "BSP Philippines","ETDA Thailand","ID Tech Wire","India Policy Hub"],
  mdb: ["ADB — Asian Development Bank","World Bank / ID4D","World Bank G2Px Programme",
    "World Bank GovTech Maturity Index","ADB Asian Development Outlook","ADB Open Finance Framework"]
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentTab   = "all";
let currentTheme = "all";

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function themeGrad(t)  { return (THEMES[t]||THEMES["Digital"]).grad; }
function themeIcon(t)  { return (THEMES[t]||THEMES["Digital"]).icon; }
function themeCls(t)   { return THEME_CLASS[t]||"theme-digital"; }
function cflag(c)      { return COUNTRY_FLAGS[c]||"🌏"; }

// ── CARD HTML ─────────────────────────────────────────────────────────────────
function cardHTML(a, featured) {
  const isMDB = a.country === "MDBs";
  const cls   = featured ? "card featured" : "card";
  const bg    = isMDB ? MDB_GRAD : themeGrad(a.theme);
  const icon  = isMDB ? "🏛️" : themeIcon(a.theme);
  const flagEl = isMDB
    ? `<span class="thumb-badge">${esc(a.org)}</span>`
    : `<span class="thumb-flag">${cflag(a.country)}</span>`;
  const orgEl = isMDB
    ? `<span class="card-org" style="color:#60a5fa">${esc(a.org)}</span>`
    : `<span class="card-org">${esc(a.country)}</span>`;
  const headline = esc(a.headline || a.title || "");
  return `<article class="${cls}" onclick="window.open('${esc(a.url)}','_blank')">
  <div class="thumb">
    <div class="thumb-bg" style="background:${bg}"><span style="position:relative;z-index:1">${icon}</span></div>
    ${flagEl}
  </div>
  <div class="card-body">
    <div class="card-meta">
      <span class="badge ${themeCls(a.theme)}">${esc(a.theme)}</span>
      ${orgEl}
      <span class="card-date">${esc(a.date)}</span>
    </div>
    <h2 class="card-headline">${headline}</h2>
    <p class="card-summary">${esc(a.summary)}</p>
    <a class="card-link" href="${esc(a.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
      Read full story
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 6h10M6 1l5 5-5 5"/></svg>
    </a>
  </div>
</article>`;
}

// ── APPLY FILTERS ─────────────────────────────────────────────────────────────
function applyFilters() {
  const main = document.getElementById("main");
  let pool;

  if (currentTab === "MDBs") {
    pool = MDB_ARTICLES;
  } else if (currentTab === "all") {
    pool = COUNTRY_ARTICLES;
  } else {
    pool = COUNTRY_ARTICLES.filter(a => a.country === currentTab);
  }

  if (currentTheme !== "all") {
    pool = pool.filter(a => a.theme === currentTheme);
  }

  if (pool.length === 0) {
    main.innerHTML = `<div class="empty"><h3>No articles match this filter</h3><p>Try a different theme or country.</p></div>`;
    return;
  }

  let html = "";

  if (currentTab === "MDBs") {
    // MDB intro + grid with ADB/WB dividers
    html += `<div class="mdb-intro">
      <h3>🏦 Multilateral Development Banks — Digital & DPI Watch</h3>
      <p>News and analysis from the <strong>Asian Development Bank (ADB)</strong> and <strong>World Bank</strong> on Digital Public Infrastructure, Digital Identity, AI, and Data Exchange across the Asia-Pacific region and our 8 focus countries.</p>
    </div>`;
    ["ADB","World Bank"].forEach(org => {
      const arts = pool.filter(a => a.org === org);
      if (!arts.length) return;
      const orgIcon = org === "ADB" ? "🏛️" : "🌍";
      html += `<div class="section-divider mdb-divider">
        <span class="flag">${orgIcon}</span>
        <h2>${esc(org)}</h2>
        <div class="line"></div>
      </div>
      <div class="grid">`;
      arts.forEach((a, i) => { html += cardHTML(a, i === 0); });
      html += `</div>`;
    });
  } else if (currentTab === "all") {
    COUNTRY_ORDER.forEach(c => {
      const arts = pool.filter(a => a.country === c);
      if (!arts.length) return;
      html += `<div class="section-divider">
        <span class="flag">${cflag(c)}</span>
        <h2>${esc(c)}</h2>
        <div class="line"></div>
      </div>
      <div class="grid">`;
      arts.forEach((a, i) => { html += cardHTML(a, i === 0); });
      html += `</div>`;
    });
  } else {
    html = `<div class="grid">`;
    pool.forEach((a, i) => { html += cardHTML(a, i === 0); });
    html += `</div>`;
  }

  main.innerHTML = html;
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function buildTabs() {
  const el = document.getElementById("tabs");
  let html = "";
  COUNTRY_TABS.forEach((c, idx) => {
    // insert divider before MDBs tab
    if (c.mdb && idx > 0) html += `<span class="tab-divider"></span>`;
    const mdbCls = c.mdb ? " tab-mdb" : "";
    html += `<button class="tab${c.id==="all"?" active":""}${mdbCls}" onclick="setTab('${c.id}',this)">
      ${c.flag} ${c.label}
    </button>`;
  });
  el.innerHTML = html;
}

// ── SETTERS ───────────────────────────────────────────────────────────────────
function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  applyFilters();
  document.getElementById("main").scrollIntoView({ behavior:"smooth", block:"start" });
}

function setTheme(theme, btn) {
  currentTheme = theme;
  document.querySelectorAll(".theme-pill").forEach(p => p.classList.remove("active"));
  btn.classList.add("active");
  applyFilters();
}

// ── SOURCES ───────────────────────────────────────────────────────────────────
function buildSources() {
  const el = document.getElementById("sources");
  const countryTags = SOURCES.country.map(s => `<span class="source-tag">${esc(s)}</span>`).join("");
  const mdbTags     = SOURCES.mdb.map(s => `<span class="source-tag mdb">${esc(s)}</span>`).join("");
  el.innerHTML = `
    <h3>News Sources</h3>
    <div class="sources-grid">${countryTags}${mdbTags}</div>
    <p class="footer-copy">Auto-updated daily via GitHub Actions · Google News RSS · ADB & World Bank news feeds · Updated ${esc(UPDATE_TIME)}</p>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById("weekLabel").textContent    = WEEK_LABEL;
document.getElementById("articleCount").textContent = ALL_ARTICLES.length + " articles this week";
buildTabs();
applyFilters();
buildSources();
</script>
